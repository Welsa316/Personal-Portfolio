<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf2f8"/>
      <stop offset="50%" style="stop-color:#fce7f3"/>
      <stop offset="100%" style="stop-color:#fbcfe8"/>
    </linearGradient>
    <linearGradient id="cone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <!-- Decorative dots -->
  <circle cx="200" cy="180" r="8" fill="#ec4899" opacity="0.2"/>
  <circle cx="600" cy="300" r="12" fill="#f472b6" opacity="0.15"/>
  <circle cx="150" cy="700" r="10" fill="#ec4899" opacity="0.12"/>
  <circle cx="680" cy="650" r="6" fill="#f472b6" opacity="0.2"/>
  <!-- Ice cream icon -->
  <g transform="translate(340, 250)" opacity="0.12">
    <!-- Cone -->
    <polygon points="30,80 90,80 60,180" fill="#92400e"/>
    <!-- Scoops -->
    <circle cx="60" cy="65" r="40" fill="#ec4899"/>
    <circle cx="35" cy="75" r="28" fill="#f472b6"/>
    <circle cx="85" cy="75" r="28" fill="#fb7185"/>
  </g>
  <!-- Title -->
  <text x="400" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="64" fill="#831843" letter-spacing="4">OK ICE CREAM</text>
  <text x="400" y="572" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="300" font-size="26" fill="#9d174d" opacity="0.7" letter-spacing="10">SHOP</text>
  <!-- Accent line -->
  <rect x="320" y="600" width="160" height="3" rx="1.5" fill="#ec4899" opacity="0.5"/>
  <!-- Subtitle -->
  <text x="400" y="650" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="16" fill="#9d174d" opacity="0.4" letter-spacing="4">LOCAL SWEET TREATS</text>
</svg>
